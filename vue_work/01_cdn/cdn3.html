<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue CDN3</title>
    <script src="https://unpkg.com/vue"></script>
</head>
<body>
    <h1>vue CDN3</h1>
    <!-- View 영역 : 유저 인터페이스(사용자가 보는 영역)-->
    <div id="app">
        <h2>{{ message }}</h2>
    </div>
    
<script>

    // Model 영역 : 데이터
    var model = {    message : "퇴근인가?" }
        

    // View-Model 역역 : 상태와 연산(데이터 변경) ==> Proxy 작업
    const app = Vue.createApp({

        data(){
            return model
        }
    })

    app.mount("#app")
    // MVVM 디자인 패턴
    /*
MVVM 패턴은 데이터 바인딩과 명령 패턴을 활용하여 View와 ViewModel 간의 데이터 흐름을 관리합니다:

Model: 애플리케이션의 데이터와 비즈니스 로직을 관리합니다. 

View: 사용자 인터페이스를 정의하고 데이터를 사용자에게 표시합니다. 

ViewModel: Model과 View 간의 연결 역할을 하며, 데이터 바인딩을 통해 View와 Model을 연결합니다. ViewModel은 View의 상태를 관리하고, 사용자의 입력을 처리하여 Model을 업데이트합니다.
    
    */
</script>

</body>
</html>
