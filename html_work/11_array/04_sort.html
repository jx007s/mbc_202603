<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04_sort</title>
</head>
<body>
    <h1>04_sort</h1>
    <script>
        let a = 10, b = 20

        document.write(`교체전1 : ${a}, ${b} <br/>`)
        a = b
        b = a
        document.write(`교체후1 : ${a}, ${b} <br/>`)

        a = 10, b = 20

        document.write(`교체전2 : ${a}, ${b} <br/>`)
        let buf = a
        a = b
        b = buf
        document.write(`교체후2 : ${a}, ${b} <br/>`)

        let arr = [70,60,80,90,50,60]

        document.write(`정렬전 : ${arr} <br/>`)
        for (const me in arr) {
            document.write(`${me} : ${arr[me]} <br/>`)

            for (let you = eval(me)+1; you < arr.length; you++) {
                //document.write(`${arr[you]} , `)    
                if(arr[me] < arr[you]){
                    buf = arr[me]
                    arr[me] = arr[you]
                    arr[you] = buf
                }
            }
            document.write(`<br/>`)
        }

        document.write(`정렬후 : ${arr} <br/>`)

        /*
        78,91,46,83,50,23,53,67,88,52,72,92,44

        05_sort2.html
        // 70점 이상 합격한 점수들을 오름차순으로 정렬하여 출력하세요
        
        */

    </script>
</body>
</html>
