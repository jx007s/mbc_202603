<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_form</title>
</head>
<body>
    <h1>01_form</h1>
    <!-- form  태그 안의 태그 내용만 action 페이지에 query 로 전달
        joinReg?pid=뭐시기&pw=뭐시기 
    -->
    <form action="jonReg">
        <input type="text" name="pid">
        <input type="text" name="pw">
        <input type="submit" value="로그인1">
    </form>

    <!-- form 안에 있지 않아 action으로 전달되지 않는다 -->
    <input type="text" name="nick">


    <!-- form  태그 안의 태그 내용만 action 페이지에 query 로 전달
        joinReg2?mid=뭐시기&age=뭐시기 
    -->

    <form action="jonReg2">
        <table border="">
            <tr>
                <td>아이디</td>
                <td><input type="text" name="mid" size="10" maxlength="6"
                    placeholder="아이디를 입력하세요"></td>
            </tr>
            <tr>
                <td>나이</td>
                <td><input type="number" name="age" value="27"></td>
            </tr>
            <tr>
                <td>암호</td>
                <td><input type="password" name="pw"></td>
            </tr>
            <tr>
                <td>생일</td>
                <td><input type="date" min="2000-01-01" max="2025-12-31"  name="birth"></td>
            </tr>
            <tr>
                <td>방문예정</td>
                <td><input type="datetime-local" name="reservation"></td>
            </tr>
            <tr>
                <td>복학</td>
                <td><input type="month" name="mm"></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="email" name="ee">
                    <input type="button" value="중복확인">
                </td>
            </tr>
            
            <tr>
                <td>전화</td>
                <td><input type="tel" name="phone"></td>
            </tr>
            <tr>
                <td>맵기정도</td>
                <td><input type="range" name="sp" min="0" max="100" step="10" value="50" ></td>
            </tr>
            <tr>
                <td>파일</td>
                <td><input type="file" name="upfile"></td>
            </tr>
            <tr>
                <td>성별</td>
                <td>
                    <input type="radio" value="m" name="gender">남
                    <input type="radio" value="f" name="gender" checked>여
                    <input type="radio" value="it" name="gender" checked>it인
                    <!-- checked 마지막으로 체크 -->
                </td>
            </tr>
            <tr>
                <td>취미</td>
                <td>
                    <input type="checkbox" name="hobby" value="baseball">야구
                    <input type="checkbox" name="hobby" value="bike" checked>바이크
                    <input type="checkbox" name="hobby" value="coding" checked>코딩
                    <!-- checked 모두 체크 -->
                </td>
            </tr>
            <tr>
                <td>직업</td>
                <td><select name="job">
                        <option value="as">의사</option>
                        <option value="df">장의사</option>
                        <option value="gh" selected>변호사</option>
                        <option value="jk">독사</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>남기실 말</td>
<!-- textarea 의 텍스트 노드는 띄어쓰기 줄바꿈 평서문형태로 작성-->                
                <td><textarea cols="50" rows="5" name="msg" >
                    아기상어
                    뚜루루뚜루 귀여운
                </textarea></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="로그인2">
                    <input type="reset" value="초기화">
                    <button>이것도 로그인2</button>
                </td>
            </tr>
        </table>


        
        
        
    </form>
</body>
</html>
