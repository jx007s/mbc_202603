<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03_sonSite</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .wrapper{
            width: 1000px;
            margin: 0 auto;
            background-color: #ffa;
        }
        .wrapper > ul{
            width: 1000px;
            height: 40px;
            background-color: #fa0;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            line-height: 38px;
        }

        .wrapper > ul > li{
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        li{
            list-style: none;
            text-align: center;
        }

        .wrapper > div{
            width: 100%;
            height: 400px;
            margin-top: 50px;
            background-color: #0f0;
        }

        .wrapper > div > ul{
            width: 300px;
            height: 100%;
            background-color: #aaf;
            float: left;
        }
        .wrapper > div > ul > li{
            width: 100%;
            height: 40px;
            padding: 5px 0px;
            background-color: #00f;
            color: #fff;
            line-height: 40px;
            border-top: 1px solid #f00;
            border-bottom: 1px solid #f00;
        }

        .wrapper > div > div{
            width: 700px;
            height: 100%;
            background-color: #aaf;
            padding: 20px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            float: left;
            gap: 10px 20px ;
        }
        figure{
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
        }
        img{
            width: 100%;
            height: 70px;
        }
        figcaption{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <ul>
            <li>회사소개</li>
            <li>갤러리</li>
            <li>제품</li>
            <li>고객센터</li>
        </ul>
        <div>
            <ul>
                <li>인사말</li>
                <li>인사개</li>
                <li>인사소</li>
                <li>인사닭</li>
            </ul>
            <div>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>하나</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>두울</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>셋</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>넷</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>5</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>6</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>7</figcaption>
                </figure>
                <figure>
                    <img src="../fff/NBDW3702.JPG">
                    <figcaption>8</figcaption>
                </figure>
                <figure>

                    <figcaption>9</figcaption>
                </figure>
                <figure>

                    <figcaption>열</figcaption>
                </figure>
                <figure>

                <figure>

            </div>
        </div>

    </div>
</body>
</html>
