<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05_font2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .wrapper{
            width: 70vw;
            height: 200px;
            /* background-color: #ff0; */
            color: #888;
            margin: 0 auto;
            font-weight: 800;
        }
        .logo{
            text-align: center;
            font-family: "Indie Flower", cursive;
            line-height: 32px;
            font-style: normal;
            color: #222;
            
        }
        ul{
            display: flex;
            justify-content: space-around;
        }
        li{
            list-style: none;
        }
        img{
            display: block;
            margin: auto;
        }

    </style>
</head>
<body>
    <h1>05_font2</h1>
    <div class="wrapper">
        <h1 class="logo">
            Alfredo<br/>Gonzales
        </h1>
        <ul>
            <li>
                <img src="../fff/font/menu01.png" alt="">
                <div>HOME</div>
            </li>
            <li>
                <img src="../fff/font/menu02.png" alt="">
                <div>SHOP</div>
            </li>
            <li>
                <img src="../fff/font/menu03.png" alt="">
                <div>CUSTOMBOX</div>
            </li>
            <li>
                <img src="../fff/font/menu04.png" alt="">
                <div>BLOG</div>
            </li>
            <li>
                <img src="../fff/font/menu05.png" alt="">
                <div>STORY</div>
            </li>
        </ul>
    </div>
</body>
</html>
