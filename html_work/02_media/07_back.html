<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07_back</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .aaa{
            width: 200px;
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: #ff0;
            margin: 10px;
        }
        .box > img{
            display: block;
            width: 200px;
        }
        .bbb{
            background: #0f0;
        }
        .ccc{
            background: url('../fff/CDCL8013.JPG');
        }
        .ddd{
            background: url('../fff/CDCL8013.JPG');
            background-size: 40%;
        }

    </style>
</head>
<body>
    <h1>07_back</h1>
    <img src="../fff/AKYO5468.JPG" class="aaa" alt="">
    <div class="box">
        <img src="../fff/AKYO5468.JPG" alt="">
    </div>
    <div class="box bbb"></div>
    <div class="box ccc"></div>
    <div class="box ddd"></div>
    
</body>
</html>
