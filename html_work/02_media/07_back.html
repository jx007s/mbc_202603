<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07_back</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .aaa{
            width: 200px;
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: #ff0;
            margin: 10px;
            float: left;
        }
        h3{
            clear: both;  /* float 무력화 
                        left, right, both(left+right)
            */
        }
        .box > img{
            display: block;
            width: 200px;
        }
        .bbb{
            background: #0f0;
        }
        .ccc{
            background: url('../fff/CDCL8013.JPG');
        }
        .ddd{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100%; /*크기 조정 : 100% - 부모 width 기준 100%
                                        - 이미지 종횡비 유지
                                */
        }

        .eee{
            background: url('../fff/CDCL8013.JPG');
            background-size: 150px; /* 너비 px - 이미지 종횡비 유지 */
        }

        .fff{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px 150px; /* 너비, 높이 */
        }

        .ggg{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: no-repeat;  /* 반복
                        repeat(기본값), no-repeat, repeat-x, repeat-y
            */
            background-color: #ff0;
        }

        .hhh{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: repeat-x;
            background-color: #ff0;
        }
        .iii{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: repeat-y;
            background-color: #ff0;
        }

        .jjj{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: no-repeat;
            background-color: #ff0;
            background-position: 30px 0px;  /*왼쪽 위*/
        }

        .kkk{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: no-repeat;
            background-color: #ff0;
            background-position: bottom; /*아래 (가로는 center가 기본값)*/
        }
        
        .lll{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: no-repeat;
            background-color: #ff0;
            background-position: right center ; /*  가로 세로
                가로 : left center right
                
                세로 :  top 
                        center 
                        bottom
                
            */
        }

        .mmm{
            background: url('../fff/CDCL8013.JPG');
            background-size: 100px; 
            background-repeat: no-repeat;
            background-color: #ff0;
            background-position: center 20px;  /*가로 위px 기준 - 방향과 px 혼용가능*/
        }

    </style>
</head>
<body>
    <h1>07_back</h1>
    <img src="../fff/AKYO5468.JPG" class="aaa" alt="">
    <div class="box">
        <img src="../fff/AKYO5468.JPG" alt="">
    </div>
    <div class="box bbb"></div>
    <div class="box ccc"></div>

    <h3>크기</h3>
    <div class="box ddd"></div>
    <div class="box eee"></div>
    <div class="box fff"></div>

    <h3>반복</h3>
    <div class="box ggg"></div>
    <div class="box hhh"></div>
    <div class="box iii"></div>

    <h3>위치</h3>
    <div class="box jjj"></div>
    <div class="box kkk"></div>
    <div class="box lll"></div>
    <div class="box mmm"></div>
    
</body>
</html>
