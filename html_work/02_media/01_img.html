<html>
    <head>
        <title>01_img</title>
    </head>
    <body>
        <h1>01_img</h1>
        <!--
        상대주소 : 현재 파일의 위치를 기준으로 참조하는 파일(이미지)의 위치 지정

        src="QEED4101.JPG"  :: 같은 폴더내의 파일
        src="../fff/NBDW3702.JPG"   :: 1단계 상위폴더 위의 fff/NBDW3702.JPG 파일
        ../         ::> 1단계 부모
        ../../      ::> 2단계 부모

        ./          ::> 현재폴더
        -->
        <img src="../fff/NBDW3702.JPG" height="100px" alt="">
        <img src="QEED4101.JPG" height="100px" alt="">
        <img src="../../QKAL1555.JPG" height="100px" alt="">
        <img src="./RREK2193.JPG" height="100px" alt="">
    </body>
</html>
