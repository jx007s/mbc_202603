<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_test</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .logo{
            width: 600px;
            height: 50px;
            margin: 50px auto;
            border: 1px solid #000;
            text-align: center;
        }

        .basic{
            width: 600px;
            height: 400px;
            border: 1px solid #000;
            margin: 30px auto;
            background-color: #ffa;
        }

        .detail{
            width: 600px;
            height: 2450px;
            border: 1px solid #000;
            background-color: #faf;
            margin: 30px auto;
        }

        .menuBtns{
            width: 600px;
            height: 50px;
            border: 1px solid #000;
            position: sticky;
            left: 50px;
            top: 50px;
        }
        .menuBtns > ul{
            width: 100%;
            height: 100%;
            background-color: #fa0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            line-height: 50px;
        }

        .menuBtns > ul > li{
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        li{
            list-style: none;
            text-align: center;
        }

        .dd > div{
            width: 100%;
            height: 600px;
            /* border: 3px solid #333; */
        }
        #d2{
            width: 100%;
            height: 100px;
            background-color: #0f0;
        }
        #dd22{
            background-color: #ff0;
        }
    </style>
</head>
<body>
    <h1>02_test</h1>

    <div class="logo">
        <h1> LOGO </h1>
    </div>

    <div class="basic"></div>
    
    <div class="detail">
        
        <div class="menuBtns">
            <ul>
                <li><a href="#d1">상세정보</a></li>
                <li><a href="#d2">리뷰</a></li>
                <li><a href="#d3">Q&amp;A</a></li>
                <li><a href="#d4">반품/교환</a></li>
            </ul>
        </div>

        <div class="dd">
            <div id="d1">details 01</div>
            <div id="d2"></div>
            <div id="dd22">details 02</div>
            <div id="d3">details 03</div>
            <div id="d4">details 04</div>
        </div>
    </div>
</body>
</html>
