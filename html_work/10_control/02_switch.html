<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_switch</title>
</head>
<body>
    <h1>02_switch</h1>
    <script>
        switch(20){
            case 30:
                document.write("30 이지롱 1<br/>")
            case 20:   // 이동하여 실행 (하위도 모두 실행)
                document.write("20 이지롱 <br/>")
            case 30:
                document.write("30 이지롱 2<br/>")
            case 50:
                document.write("50 이지롱 <br/>")
            case 10:
                document.write("10 이지롱 <br/>")
        }
        document.write("switch 종료 ---------  1<br/>")

        switch(30){
            case 30:
                document.write("30 이지롱 1<br/>")
                break   //제어문 탈출
            case 20: 
                document.write("20 이지롱 <br/>")
                break
            case 30:    //같은 값이 있을 경우 먼저 설정한 case 실행 후 탈출
                document.write("30 이지롱 2<br/>")
                break
            case 50:
                document.write("50 이지롱 <br/>")
                break
            case 10:
                document.write("10 이지롱 <br/>")
                break
        }
        document.write("switch 종료 ---------  2<br/>")

        switch(50){
            case 30:
                document.write("30 이지롱 1<br/>")
                break   //제어문 탈출
            case 20: 
                document.write("20 이지롱 <br/>")
                break
            default:    //else 와 같음 - 중간에 있어도 다른 case 지장에 문제 없음
                document.write("기본값 이지롱 <br/>")
                break
            case 50:
                document.write("50 이지롱 <br/>")
                break
            case 10:
                document.write("10 이지롱 <br/>")
                break
        }
        document.write("switch 종료 ---------  3<br/>")


        switch(50){
            case 30:
                document.write("30 이지롱 1<br/>")
                break   //제어문 탈출
            case 20: 
                document.write("20 이지롱 <br/>")
                break
            case 50,60,70,80:   // 50 진입 안함
                document.write("50,60,70,80 이지롱 <br/>")
                break
            case 10:
                document.write("10 이지롱 <br/>")
                break
        }
        document.write("switch 종료 ---------  4<br/>")

        switch("나는무너"){// 정수,실수,문자열,boolean 가능
            case true:
                document.write("true 이지롱 <br/>")
                break   //제어문 탈출
            case 123.456: 
                document.write("123.456 이지롱 <br/>")
                break
            case "나는무너":
                document.write("나는무너 이지롱 <br/>")
                break
            case 10:
                document.write("10 이지롱 <br/>")
                break
        }
        document.write("switch 종료 ---------  5<br/>")

        //직급별 월급을 계산 하세요
        //부장 : 50%, 과장 : 30%, 대리 : 20%, 사원:10%
        //월급 :  기본급 + 기본급*보너스
        //직급과 기본급은 입력받아 처리

        const pos = "과장"
        const base = 600
        var bonus

        switch(pos){
            case "부장":
                bonus = 0.5
                break
            case "과장":
                bonus = 0.3
                break
            case "대리":
                bonus = 0.2
                break
            default:
                bonus = 0.1
                break

        }
        var money = base + base*bonus

        document.write(`${pos} <br/>`)
        document.write(`${base} <br/>`)
        document.write(`${bonus} <br/>`)
        document.write(`${money} <br/>`)


/*
        03_coffee.html
        커피를 주문받아 처리하세요
        메뉴, 가격, 수량
        아메리카노 : 2000
        아시아노   : 3000
        아프리카노 : 4000
*/
    </script>
</body>
</html>
