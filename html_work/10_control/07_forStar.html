<!DOCTYPE html>

    <title>07_forStar</title>
</head>
<body>
    <h1>07_forStar</h1>
    <script>
        for(let line = 0 ; line < 5 ; line++){
            for (let star = 0; star <= line; star++) {
                                //star <= line : 반복횟수 동적처리
                
                document.write(`*`)    
            }
            document.write(`${line}<br/>`)
        }
